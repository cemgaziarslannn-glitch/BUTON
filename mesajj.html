<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CGA COMMAND | TALİMATLAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ana: #00e5ff;
            --arka: #00080a;
            --panel: #0a1114;
            --kenar: rgba(0, 229, 255, 0.15);
            --yazi: #ffffff;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--arka); color: var(--yazi);
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* --- ÜST BAR --- */
        .top-nav {
            padding: calc(15px + var(--safe-top)) 20px 15px;
            border-bottom: 1px solid var(--kenar);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 8, 10, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--kenar);
            color: var(--ana); padding: 10px 15px; border-radius: 12px;
            font-weight: 800; font-size: 11px; display: flex; align-items: center; gap: 8px;
        }

        /* --- İÇERİK --- */
        .container { 
            flex: 1; padding: 20px; width: 100%; max-width: 600px; margin: 0 auto; 
            padding-bottom: calc(40px + var(--safe-bottom));
        }
        .page-header { margin-bottom: 25px; }
        .page-title { font-size: 20px; font-weight: 800; color: var(--ana); display: flex; align-items: center; gap: 10px; }

        /* --- TALİMAT KARTLARI --- */
        .msg-card {
            background: var(--panel); border: 1px solid var(--kenar);
            border-radius: 22px; padding: 20px; margin-bottom: 15px;
            position: relative;
        }
        .msg-card.unread { border-left: 4px solid var(--ana); box-shadow: 0 10px 30px rgba(0, 229, 255, 0.05); }
        
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sender-info { font-size: 12px; font-weight: 800; color: var(--ana); text-transform: uppercase; }
        .time { font-size: 10px; color: #444; }

        .content { font-size: 15px; line-height: 1.6; color: #bbb; margin-bottom: 20px; }

        .btn-confirm {
            width: 100%; padding: 18px; background: var(--ana);
            color: #000; border: none; border-radius: 16px;
            font-weight: 900; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-confirm:disabled { background: #1a1a1a; color: #444; }

        /* --- PREMİUM MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            padding: 20px;
        }
        .modal-box {
            background: #0a1114; border: 1px solid var(--kenar);
            width: 100%; max-width: 380px; border-radius: 30px;
            padding: 40px 25px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
        }
        .modal-icon { font-size: 45px; color: var(--ana); margin-bottom: 25px; }
        .modal-box p { font-size: 16px; line-height: 1.7; color: #eee; margin-bottom: 35px; }
        .modal-box b { color: var(--ana); font-weight: 800; text-transform: uppercase; }

        .modal-actions { display: flex; flex-direction: column; gap: 12px; }
        .m-btn { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; border: none; font-size: 14px; }
        .m-yes { background: var(--ana); color: #000; box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3); }
        .m-no { background: transparent; color: #555; }

        #toast {
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
            background: var(--ana); color: #000; padding: 12px 30px;
            border-radius: 50px; font-weight: 800; display: none; z-index: 10000;
        }
    </style>
</head>
<body>

<div id="toast">ONAYLANDI</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-shield-check"></i></div>
        <p id="modalText">...</p>
        <div class="modal-actions">
            <button class="m-btn m-yes" id="finalConfirmBtn">ONAYLIYORUM</button>
            <button class="m-btn m-no" onclick="closeModal()">İPTAL</button>
        </div>
    </div>
</div>

<div class="top-nav">
    <button class="back-btn" onclick="location.href='guvenlik.html'">
        <i class="fas fa-chevron-left"></i> GERİ
    </button>
    <div style="text-align: right;">
        <div id="userDisplay" style="font-size: 13px; font-weight: 800; color: var(--ana);">...</div>
        <div style="font-size: 9px; color: #444;">KOLART GÜVENLİK</div>
    </div>
</div>

<div class="container">
    <div class="page-header">
        <div class="page-title"><i class="fas fa-clipboard-list"></i> TALİMATLAR VE MESAJLAR</div>
    </div>
    <div id="msgList">
        <div style="text-align: center; padding-top: 50px;"><i class="fas fa-spinner fa-spin" style="color:var(--ana)"></i></div>
    </div>
</div>

<script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const siteID = localStorage.getItem("siteID");
    const siteConfig = JSON.parse(localStorage.getItem("siteConfig"));
    const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));

    if (!siteID || !currentUser) { window.location.href = "index.html"; }

    const app = getApps().find(a => a.name === `siteApp-${siteID}`) || initializeApp(siteConfig, `siteApp-${siteID}`);
    const db = getDatabase(app);
    
    document.getElementById("userDisplay").innerText = currentUser.username.toUpperCase();
    const userUID = currentUser.username;

    onValue(ref(db, `user_messages/${userUID}`), (snapshot) => {
        const list = document.getElementById("msgList");
        list.innerHTML = "";
        const data = snapshot.val();
        if (!data) { list.innerHTML = `<div style="text-align:center; color:#333; margin-top:50px;">TALİMAT BULUNMUYOR</div>`; return; }

        Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp).forEach(key => {
            const msg = data[key];
            const div = document.createElement("div");
            div.className = `msg-card ${msg.is_read ? '' : 'unread'}`;
            div.innerHTML = `
                <div class="msg-header">
                    <div class="sender-info"><i class="fas fa-user-tie"></i> ${msg.from}</div>
                    <div class="time">${msg.saat}</div>
                </div>
                <div class="content">${msg.content}</div>
                ${msg.is_read 
                    ? `<button class="btn-confirm" disabled><i class="fas fa-check"></i> ONAYLANDI</button>`
                    : `<button class="btn-confirm" onclick="openModal('${key}', '${msg.from}')">OKUDUM, ANLADIM</button>`
                }
            `;
            list.appendChild(div);
        });
    });

    let activeKey = null;
    window.openModal = (key, sender) => {
        activeKey = key;
        const currentPerson = currentUser.username.toUpperCase();
        // İsim bazlı dinamik metin (Ünvanlar kaldırıldı)
        document.getElementById("modalText").innerHTML = `<b>${currentPerson}</b>, Yetkili <b>${sender}</b> tarafından gönderilen talimatı okuduğunuzu ve anladığınızı onaylıyor musunuz?`;
        document.getElementById("confirmModal").style.display = "flex";
    };

    window.closeModal = () => document.getElementById("confirmModal").style.display = "none";

    document.getElementById("finalConfirmBtn").onclick = async () => {
        await update(ref(db, `user_messages/${userUID}/${activeKey}`), { is_read: true, read_at: Date.now() });
        closeModal();
        const t = document.getElementById("toast");
        t.style.display = "block"; setTimeout(() => t.style.display = "none", 2000);
    };
</script>
</body>
</html>
